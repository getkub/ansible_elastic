input {
  kafka {
    bootstrap_servers => "example1.servicebus.windows.net:9093"
    topics => ["insights-operational-logs"]

    group_id => "iam_team"
    consumer_threads => 8

    security_protocol => "SASL_SSL"
    sasl_mechanism => "PLAIN"
    sasl_jaas_config => "org.apache.kafka.common.security.plain.PlainLoginModule required username='$ConnectionString' password='Endpoint=sb://example1...';"

    auto_offset_reset => "earliest"   # equivalent to "beginning"
    decorate_events => true
  }

  kafka {
    bootstrap_servers => "example2.servicebus.windows.net:9093"
    topics => ["insights-metrics-pt1m"]

    group_id => "db_team"
    consumer_threads => 8

    security_protocol => "SASL_SSL"
    sasl_mechanism => "PLAIN"
    sasl_jaas_config => "org.apache.kafka.common.security.plain.PlainLoginModule required username='$ConnectionString' password='Endpoint=sb://example2...';"

    auto_offset_reset => "latest"   # equivalent to "end"
    decorate_events => true
  }
}
